name: Demo CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - run: echo "Building the project..." > output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: output.txt

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifact
      - run: cat output.txt
  
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run linter
        run: echo "Running linter..."